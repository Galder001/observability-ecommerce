global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Carga las reglas de alertas
rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'ecommerce-api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s