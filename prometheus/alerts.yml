groups:
  - name: ecommerce.security
    interval: 15s
    rules:
      - alert: BruteForceDetectado
        expr: sum(rate(auth_attempts_total{result="failure"}[1m])) > 0.08
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Posible ataque de fuerza bruta detectado"
          description: "Tasa de fallos de autenticacion elevada"

      - alert: RateLimitActivado
        expr: sum(rate(rate_limit_hits_total[1m])) > 0.05
        for: 15s
        labels:
          severity: warning
        annotations:
          summary: "Rate limiter bloqueando peticiones"
          description: "El rate limiter esta activo"

  - name: ecommerce.performance
    interval: 15s
    rules:
      - alert: LatenciaAltaP95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, route)) > 0.5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Latencia p95 elevada"
          description: "Latencia superior a 500ms"

      - alert: RevenueSinCrecer
        expr: rate(orders_revenue_total[5m]) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Sin nuevas ventas en 5 minutos"
          description: "El revenue no ha incrementado"